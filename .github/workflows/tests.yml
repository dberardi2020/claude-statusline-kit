name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  bash:
    name: bash (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render golden tests
        run: bash tests/run.sh
      - name: Install-mode tests
        run: bash tests/install.sh

  powershell:
    name: PowerShell (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render golden tests (PowerShell 7)
        shell: pwsh
        run: pwsh -NoProfile -File tests/run.ps1
      - name: Render golden tests (Windows PowerShell 5.1)
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File tests\run.ps1
